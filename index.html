<script>
document.getElementById("save-user-btn").addEventListener("click", () => {
  const nameInput = document.getElementById("user-fullname");
  const emailInput = document.getElementById("user-email");
  const error = document.getElementById("user-modal-error");

  const name = nameInput.value.trim();
  const email = emailInput.value.trim();

  if (!name || !email) {
    error.textContent = "Both name and email are required.";
    return;
  }

  const identity = {
    name,
    email,
    time: new Date().toISOString()
  };

  // 🔹 session identity (used by app)
  sessionStorage.setItem("gpsUserIdentity", JSON.stringify(identity));

  // 🔹 last-used identity (used only to prefill)
  localStorage.setItem("gpsUserLastIdentity", JSON.stringify(identity));

  document.getElementById("user-modal").style.display = "none";

  startTracking();
  sendToFormspree({ message: "✅ User session started" });
});
async function getDeviceModel() {
  // Try modern API first (works on newer Android Chrome)
  if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
    try {
      const ua = await navigator.userAgentData.getHighEntropyValues(["model"]);
      if (ua.model) return ua.model;
    } catch(e) {}
  }

  // Fallback to old method
  const userAgent = navigator.userAgent;

  const androidMatch = userAgent.match(/Android.*;\s(.*?)\sBuild/);
  if (androidMatch) return androidMatch[1];

   if (/iPhone/.test(userAgent)) {
    const w = screen.width;
    const h = screen.height;

    // iPhone guesses
    if (w === 375 && h === 812) return "iPhone X / XS / 11 Pro";
    if (w === 414 && h === 896) return "iPhone XR / XS Max / 11";
    if (w === 390 && h === 844) return "iPhone 12 / 13 / 14";
    if (w === 428 && h === 926) return "iPhone 12 Pro Max / 13 Pro Max / 14 Plus";
    if (w === 393 && h === 852) return "iPhone 15 / 15 Pro";
    if (w === 430 && h === 932) return "iPhone 15 Pro Max";

    return "iPhone (unknown model)";
  }

 
  if (/iPad/.test(userAgent)) return "iPad";

  return "Unknown device";
}
</script>

<script>
async function sendToFormspree(payload) {
  const identity = getUserIdentity();
  if (!identity) return;

  const finalPayload = {
    ...payload,
    name: identity.name,
    email: identity.email,
    app: "Handheld GPS",
    device: await getDeviceModel(),
    time: new Date().toISOString()
  };

  return fetch("https://formspree.io/f/manpjgqd", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(finalPayload)
  });
}

</script>

<script>
let gpsMap;
let gpsMarker;
let trackPolyline;
let trackRoute = [];
let accuracyChart;

function formatDMS(deg, isLatitude = true) {
  const sign = deg < 0 ? -1 : 1;
  const absDeg = Math.abs(deg);
  const d = Math.floor(absDeg);
  const m = Math.floor((absDeg - d) * 60);
  const s = ((absDeg - d) * 60 - m) * 60;
  const direction = isLatitude ? (sign < 0 ? 'S' : 'N') : (sign < 0 ? 'W' : 'E');
  return `${d}° ${m}' ${s.toFixed(2)}" ${direction}`;
}

function convertLatLonFormats(lat, lon) {
  return {
    ddText: `${lat.toFixed(6)}°, ${lon.toFixed(6)}°`,
    latDMS: formatDMS(lat, true),
    lonDMS: formatDMS(lon, false)
  };
}

function initMap() {
  if (typeof L === 'undefined') return;
  gpsMap = L.map('map', { center: [0, 0], zoom: 2, zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(gpsMap);
  gpsMarker = L.marker([0, 0]).addTo(gpsMap);
  trackPolyline = L.polyline([], { color: '#2f69db', weight: 4, opacity: 0.9 }).addTo(gpsMap);
  gpsMap.whenReady(() => {
    setTimeout(() => gpsMap.invalidateSize(), 100);
  });
}

window.addEventListener('resize', () => {
  if (gpsMap) {
    gpsMap.invalidateSize();
  }
});

function updateMapPosition(lat, lon, accuracy) {
  if (!gpsMap || !gpsMarker) return;
  const coords = [lat, lon];
  gpsMarker.setLatLng(coords);
  trackRoute.push(coords);
  trackPolyline.setLatLngs(trackRoute);
  gpsMap.setView(coords, Math.max(13, gpsMap.getZoom()));
}

function updateLocationPanels(lat, lon, accuracy, zone, displayHeight) {
  const latlonBox = document.getElementById('latlon-box');
  if (latlonBox) latlonBox.innerHTML = `<strong>Lat/Lon:</strong> ${lat.toFixed(6)}, ${lon.toFixed(6)}<br><strong>Height:</strong> ${displayHeight}<br><strong>Accuracy:</strong> ${accuracy.toFixed(1)} m<br><strong>Zone:</strong> ${zone}`;
  const formatsBox = document.getElementById('coordinate-formats');
  if (formatsBox) {
    const converted = convertLatLonFormats(lat, lon);
    formatsBox.innerHTML = `<strong>Decimal:</strong> ${converted.ddText}<br><strong>DMS:</strong> ${converted.latDMS} / ${converted.lonDMS}`;
  }
}

function initAccuracyChart() {
  const ctx = document.getElementById('accuracy-chart');
  if (!ctx || typeof Chart === 'undefined') return;
  accuracyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Accuracy (m)',
        data: [],
        borderColor: '#2f69db',
        backgroundColor: 'rgba(47,105,219,0.18)',
        fill: true,
        tension: 0.4,
        pointRadius: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });
}

function updateAccuracyChart(accuracy) {
  if (!accuracyChart) return;
  const label = new Date().toLocaleTimeString();
  accuracyChart.data.labels.push(label);
  accuracyChart.data.datasets[0].data.push(accuracy);
  if (accuracyChart.data.labels.length > 20) {
    accuracyChart.data.labels.shift();
    accuracyChart.data.datasets[0].data.shift();
  }
  accuracyChart.update();
}

function renderPickedPointsTable() {
  const tbody = document.querySelector('#picked-points-table tbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  storedCoordinates.forEach(coord => {
    const row = document.createElement('tr');
    row.innerHTML = `<td>${coord.description}</td><td style="text-align:right;">${coord.accuracy}</td><td style="text-align:right;">${coord.distance || '—'}</td>`;
    tbody.appendChild(row);
  });
}

document.addEventListener('DOMContentLoaded', () => {
  initMap();
  initAccuracyChart();
});
</script>

<script>
  const storedCoordinates = [];
  let descriptionCount = 1;
  let prefixCounts = {}; // Track counts per prefix

  // Function to handle vibration
  function vibrateDevice() {
    if (navigator.vibrate) {
      navigator.vibrate(100); // Vibrate for 100 milliseconds
    } else {
      console.log("Vibration is not supported on this device.");
    }
  }

  function ddToUTM(lat, lon) {
    const a = 6378137.0;
    const f = 1 / 298.257223563;
    const k0 = 0.9996;
    const e = Math.sqrt(f * (2 - f));

    const zone = Math.floor((lon + 180) / 6) + 1;
    const lambda0 = ((zone - 1) * 6 - 180 + 3) * Math.PI / 180;

    const phi = lat * Math.PI / 180;
    const lambda = lon * Math.PI / 180;

    const n = a / Math.sqrt(1 - Math.pow(e * Math.sin(phi), 2));
    const t = Math.pow(Math.tan(phi), 2);
    const c = Math.pow(e, 2) / (1 - Math.pow(e, 2)) * Math.pow(Math.cos(phi), 2);
    const A = Math.cos(phi) * (lambda - lambda0);

    const m = a * ((1 - Math.pow(e, 2)/4 - 3*Math.pow(e, 4)/64 - 5*Math.pow(e, 6)/256) * phi
                - (3*Math.pow(e, 2)/8 + 3*Math.pow(e, 4)/32 + 45*Math.pow(e, 6)/1024) * Math.sin(2*phi)
                + (15*Math.pow(e, 4)/256 + 45*Math.pow(e, 6)/1024) * Math.sin(4*phi)
                - (35*Math.pow(e, 6)/3072) * Math.sin(6*phi));

    const easting = 500000 + k0 * n * (A + (1 - t + c) * Math.pow(A, 3)/6 +
                      (5 - 18*t + t*t + 72*c - 58*(Math.pow(e, 2)/(1 - Math.pow(e, 2)))) * Math.pow(A, 5)/120)-83.86;

    const northing = k0 * (m + n * Math.tan(phi) * (Math.pow(A, 2)/2 +
                       (5 - t + 9*c + 4*c*c) * Math.pow(A, 4)/24 +
                       (61 - 58*t + t*t + 600*c - 330*(Math.pow(e, 2)/(1 - Math.pow(e, 2)))) * Math.pow(A, 6)/720))+296.89;

    const northingAdjusted = lat < 0 ? northing + 10000000 : northing;
    const hemisphere = lat < 0 ? 'S' : 'N';

    return {
      zone: zone + hemisphere,
      easting: easting.toFixed(3),
      northing: northingAdjusted.toFixed(3)
    };
  }

  function handleGeoSuccess(pos) {

  const startWatch = () => navigator.geolocation.watchPosition(handleGeoSuccess, handleGeoError, {

document.getElementById('pick-btn').addEventListener('click', function () {
  const descriptionField = document.getElementById('description');
  let raw = descriptionField.value.trim();

  // Default prefix if user leaves it empty
  if (!raw) raw = '1';

  let prefix = '';
  let number = null;

  // Case 1: only numbers (e.g., "5")
  if (/^\d+$/.test(raw)) {
    number = parseInt(raw, 10);
    prefix = ''; // pure numbers, no prefix
  }
  // Case 2: prefix + optional number (e.g., "G10" or "Tree7" or "G")
  else {
    const m = raw.match(/^([^\d]+)(\d+)?$/);
    if (m) {
      prefix = m[1];
      number = m[2] ? parseInt(m[2], 10) : null;
    } else {
      // Fallback: treat everything as prefix
      prefix = raw;
    }
  }

  // Init prefix counter if needed
  if (!prefixCounts[prefix]) prefixCounts[prefix] = 1;

  // If user typed a number, use it; otherwise use next from counter
  const counter = number != null ? number : prefixCounts[prefix];
  const fullDescription = `${prefix}${counter}`;

  // Increment for next time
  prefixCounts[prefix] = counter + 1;

  const accuracy = document.getElementById('accuracy').value;
  if (accuracy) {
    const coordData = {
      description: fullDescription,
      accuracy: accuracy,

  function renderSavedCSVsDropdown() {

function getSelectedSavedCsv() {
  const select = document.getElementById('saved-csv-select');
  const idx = select.value === '' ? -1 : parseInt(select.value, 10);
  if (idx < 0) return null;

  const savedCSVs = JSON.parse(localStorage.getItem('savedCSVs') || '[]');
  return savedCSVs[idx] || null;
}

function parseCsvToStoredCoordinates(csvText) {
  // Basic CSV parsing (expects the header used by your exporter)
  const rows = csvText.trim().split(/\r?\n/).map(r => r.split(','));
  const headers = rows[0].map(h => h.trim());
  const out = [];

  for (let i = 1; i < rows.length; i++) {
    if (!rows[i] || rows[i].length < headers.length) continue;
    const rec = {};
    headers.forEach((h, j) => {
      rec[h] = rows[i][j];
    });
    out.push(rec);
  }
  return out;
}

// Button: Load into app (parses CSV and fills storedCoordinates + preview)
document.getElementById('load-csv-btn').addEventListener('click', () => {

  const parsed = parseCsvToStoredCoordinates(csv.content);

  // Clear and repopulate your app’s array
  storedCoordinates.length = 0;

  // Map parsed records back to your internal keys
  parsed.forEach(row => {
    storedCoordinates.push({
      description: row.Description,
      accuracy: row.Accuracy,
      northing: row.Northing,
      easting: row.Easting,
      height: row.Height,
      timestamp: row.Timestamp
    });
  });

document.getElementById('delete-csv-btn').addEventListener('click', () => {
